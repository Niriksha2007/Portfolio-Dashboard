<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Digital Enterprise | Login</title>

    <!-- Google Font -->
    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
        href="css/login.css">

</head>

<body>

<div class="login-wrapper">


    <section class="left-panel">

        <div class="enterprise-card large-card">

            <h1>Digital Enterprise</h1>

        </div>

        <div class="enterprise-card medium-card">

            <h2>
                Secure access to
                <br>
                COE Dashboard
            </h2>

        </div>

        <div class="enterprise-card small-card">

            <h3>
                Secure Enterprise
                <br>
                Access
            </h3>

        </div>

    </section>


    <section class="login-panel">

        <div class="login-card">

            <h1>Welcome Back!</h1>

            <p>
                Sign in to continue to
                COE Portfolio Command Center
            </p>

            <hr>

            <form id="loginForm">

                <!-- Email -->

                <div class="form-group">

                    <label>Email Address</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email address"
                        required>

                </div>

             

                <div class="form-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required>

                </div>

             

                <div class="login-options">

                    <label>

                        <input type="checkbox">

                        Remember me

                    </label>

                    <a href="#">

                        Forgot Password?

                    </a>

                </div>

              

                <button
                    type="submit"
                    class="login-btn">

                    Sign In

                </button>

                <div class="divider">

                    <span>

                        or continue with

                    </span>

                </div>

                <button
                    type="button"
                    class="sso-btn">

                    <i class="fa-solid fa-building"></i>

                    Sign in with SSO

                </button>

            </form>

            <div class="footer-text">

                Secure login powered by
                <strong>Digital Enterprise</strong>

            </div>

        </div>

    </section>

</div>

<script src="js/login.js"></script>

</body>

</html>
